<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thanks — Snappy</title>
<link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='26' fill='%232e8fe8'/%3E%3Cpath d='M32 6a26 26 0 1 0 0 52z' fill='%230c0c0e'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Geist:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .thanks {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem var(--gutter);
    max-width: 640px;
    margin: 0 auto;
  }
  .thanks-mark {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 2rem;
    margin-bottom: 2rem;
  }
  .thanks h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(2.5rem, 5vw, 4rem);
    line-height: 1;
    letter-spacing: -0.03em;
    margin: 0 0 1.25rem;
    font-variation-settings: "opsz" 144, "SOFT" 40;
  }
  .thanks h1 em {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  }
  .thanks p {
    color: var(--text-dim);
    font-size: 1.05rem;
    line-height: 1.65;
    margin: 0 0 1rem;
  }
  .thanks .email-note {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--text-faint);
    margin-top: 2rem;
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-panel);
  }
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header class="nav">
  <a href="/" class="logo" aria-label="Snappy home">
    <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true">
      <circle cx="16" cy="16" r="13" fill="currentColor" />
      <path d="M16 3a13 13 0 1 0 0 26z" fill="var(--bg)" />
    </svg>
    <span class="logo-text">Snappy</span>
  </a>
</header>

<main class="thanks">
  <div class="thanks-mark">✓</div>
  <h1>Payment received.<br /><em>Welcome aboard.</em></h1>
  <p>Thanks for buying Snappy. A receipt and your download link are on their way to the email you used at checkout.</p>
  <p class="email-note">
    Can't find the email? Check your spam folder, then drop us a line at <a href="mailto:YOUR_SUPPORT_EMAIL" style="color: var(--accent);">YOUR_SUPPORT_EMAIL</a> — we'll sort it out.
  </p>
  <a href="/" class="btn btn-ghost btn-lg" style="margin-top: 2.5rem;">← Back to site</a>
</main>
</body>
</html>
